packages:
  - 'apps/*'
  - 'packages/*'
  - 'tooling/*'

autoInstallPeers: false
strictPeerDependencies: true
engineStrict: true
nodeVersion: 24.18.0
pmOnFail: error
savePrefix: ''
verifyStoreIntegrity: true
updateNotifier: false

allowBuilds:
  '@prisma/engines': true
  prisma: true
  sharp: true
  unrs-resolver: true
