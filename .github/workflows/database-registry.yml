name: Database Registry Map

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: database-registry-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    name: Generate database registry
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Diagnose repository formatting
        run: |
          set +e
          npx --yes prettier@3.9.0 --list-different . > /tmp/prettier-different.txt
          status=$?
          set -e
          echo "PRETTIER_DIFFERENT_BEGIN"
          cat /tmp/prettier-different.txt
          echo "PRETTIER_DIFFERENT_END status=${status}"

      - name: Upload formatting diagnostic
        uses: actions/upload-artifact@v7
        with:
          name: prettier-diagnostic-${{ github.sha }}
          path: /tmp/prettier-different.txt
          if-no-files-found: error
          retention-days: 1

      - name: Test database registry generator
        run: node --test tooling/database-registry/generate.test.mjs

      - name: Generate publishable registry
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          node tooling/database-registry/generate.mjs
          --mode publish
          --output docs/generated/database-registry
          --write

      - name: Verify generated registry contract
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          node - <<'NODE'
          const { readFileSync } = require('node:fs');
          const inventory = JSON.parse(
            readFileSync('docs/generated/database-registry/inventory.json', 'utf8'),
          );

          const failures = [];
          if (inventory.source.sha !== process.env.EXPECTED_SHA) {
            failures.push('inventory source SHA does not match the checked-out commit');
          }
          if (!Number.isInteger(inventory.database.modelCount) || inventory.database.modelCount < 1) {
            failures.push('no Prisma models were discovered');
          }
          if (!Array.isArray(inventory.registry.modules) || inventory.registry.modules.length < 1) {
            failures.push('no Module Registry entries were discovered');
          }
          if (!Array.isArray(inventory.database.migrations)) {
            failures.push('migration inventory is missing');
          }
          if (!Array.isArray(inventory.api.endpoints)) {
            failures.push('API inventory is missing');
          }
          if (failures.length > 0) {
            throw new Error(failures.join('\n'));
          }
          NODE
          test -s docs/generated/database-registry/index.html
          test -s docs/generated/database-registry/inventory.json
          test -f docs/generated/database-registry/.nojekyll

      - name: Upload review artifact
        uses: actions/upload-artifact@v7
        with:
          name: database-registry-${{ github.sha }}
          path: docs/generated/database-registry
          if-no-files-found: error
          retention-days: 30

      - name: Upload GitHub Pages artifact
        if: >-
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          vars.DATABASE_REGISTRY_PAGES_ENABLED == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/generated/database-registry

  deploy:
    name: Publish database registry
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      vars.DATABASE_REGISTRY_PAGES_ENABLED == 'true'
    needs: generate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
