name: Engineering Failure Intake

on:
  workflow_run:
    workflows:
      - Continuous Integration
      - Database Registry Map
      - Pull Request Governance
      - Engineering External Intake
      - Engineering Issue Normalization
      - Engineering Failure Audit
    types:
      - completed

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: engineering-failure-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  capture-failure:
    name: Capture failed workflow evidence
    if: >-
      github.event.workflow_run.conclusion == 'failure' ||
      github.event.workflow_run.conclusion == 'timed_out' ||
      github.event.workflow_run.conclusion == 'action_required'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out default branch controls
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Capture and classify failure
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node tooling/capture-workflow-failure.mjs
