name: Format Authentication HTTP

on:
  push:
    branches:
      - agent/authentication-http-endpoints

permissions:
  contents: write

jobs:
  format:
    if: ${{ !contains(github.event.head_commit.message, '[skip authentication http formatter]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/authentication-http-endpoints

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - run: pnpm install --frozen-lockfile

      - name: Apply repository formatter
        run: |
          pnpm exec prettier --write \
            apps/api/src/app.module.ts \
            apps/api/src/authentication-http \
            apps/api/src/http-security/http-security.decorators.ts \
            apps/api/src/http-security/http-security.guard.ts \
            apps/api/src/http-security/http-security.guard.spec.ts \
            apps/api/src/http-security/http-security.interceptor.ts \
            apps/api/src/http-security/http-security.interceptor.spec.ts \
            apps/api/src/http-security/http-security.module.ts \
            apps/api/src/http-security/http-security-request.ts \
            docs/decisions/0020-build-authentication-http-endpoints.md \
            docs/decisions/README.md

      - name: Commit formatted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            apps/api/src/app.module.ts \
            apps/api/src/authentication-http \
            apps/api/src/http-security/http-security.decorators.ts \
            apps/api/src/http-security/http-security.guard.ts \
            apps/api/src/http-security/http-security.guard.spec.ts \
            apps/api/src/http-security/http-security.interceptor.ts \
            apps/api/src/http-security/http-security.interceptor.spec.ts \
            apps/api/src/http-security/http-security.module.ts \
            apps/api/src/http-security/http-security-request.ts \
            docs/decisions/0020-build-authentication-http-endpoints.md \
            docs/decisions/README.md

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "Format authentication HTTP slice [skip authentication http formatter]"
          git push origin HEAD:agent/authentication-http-endpoints
