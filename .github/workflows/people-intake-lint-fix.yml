name: Fix People Intake Lint Temporary

on:
  pull_request:
    types:
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  fix:
    if: >-
      github.head_ref == 'agent/family-intake-verification-dashboard' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v7
        with:
          ref: agent/family-intake-verification-dashboard
          fetch-depth: 1
          persist-credentials: true

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply reviewed dashboard repairs
        run: python tooling/temp-fix-people-intake-lint.py

      - name: Apply safe ESLint fixes and formatting
        run: |
          pnpm exec eslint \
            apps/web/src/app/internal/people-intake/people-intake-dashboard.tsx \
            apps/web/src/app/internal/people-intake/people-intake-model.ts \
            --fix
          pnpm format
          pnpm lint
          pnpm format:check

      - name: Commit lint repairs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/app/internal/people-intake/people-intake-dashboard.tsx \
            apps/web/src/app/internal/people-intake/people-intake-model.ts
          git commit -m "Fix People Intake dashboard lint"
          git push origin HEAD:agent/family-intake-verification-dashboard
