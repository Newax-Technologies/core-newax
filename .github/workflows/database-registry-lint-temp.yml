name: Database Registry Lint Temporary

on:
  pull_request:

jobs:
  lint-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Install dependencies quietly
        run: pnpm install --frozen-lockfile > /tmp/install.log 2>&1

      - name: Capture focused lint output
        run: |
          set +e
          pnpm exec eslint tooling/database-registry/explain.js tooling/database-registry/render.mjs --max-warnings=0 2>&1 | tee /tmp/registry-lint.txt
          echo "Focused lint exit status: ${PIPESTATUS[0]}"
          exit 0

      - name: Upload focused lint output
        uses: actions/upload-artifact@v7
        with:
          name: detailed-registry-lint-${{ github.sha }}
          path: /tmp/registry-lint.txt
          if-no-files-found: error
          retention-days: 1
