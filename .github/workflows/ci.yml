name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  DATABASE_URL: postgresql://newax:newax_ci@localhost:5432/newax_ci?schema=public
  NEXT_TELEMETRY_DISABLED: 1
  SEARCH_INDEXING_ENABLED: false

jobs:
  verify:
    name: Verify monorepo
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: newax_ci
          POSTGRES_PASSWORD: newax_ci
          POSTGRES_USER: newax
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U newax -d newax_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate database schema
        run: pnpm --filter @newax/api db:validate

      - name: Apply database migrations
        run: pnpm --filter @newax/api db:migrate:deploy

      - name: Verify migration status
        run: pnpm --filter @newax/api exec prisma migrate status

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
