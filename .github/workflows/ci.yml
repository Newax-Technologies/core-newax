name: Repair pnpm Lockfile Policy

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: lockfile-policy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    name: Regenerate lockfile policy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out main
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Regenerate lockfile with workspace policy
        run: pnpm install --lockfile-only --ignore-scripts --no-frozen-lockfile

      - name: Validate strict frozen installation
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Commit corrected lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Regenerate lockfile with strict peer policy"
          git push origin HEAD:main
