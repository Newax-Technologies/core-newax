name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Generate pnpm lockfile
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: automation/generate-pnpm-lock

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Generate lockfile
        run: pnpm install --lockfile-only --ignore-scripts --no-frozen-lockfile --strict-peer-dependencies=false

      - name: Commit generated lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Generate pnpm lockfile"
          git push origin HEAD:automation/generate-pnpm-lock

      - name: Upload generated lockfile
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-lock
          path: pnpm-lock.yaml
          if-no-files-found: error
