name: Capture Addresses HTTP Format

on:
  pull_request:
    branches:
      - agent/organization-addresses-foundation
    types: [synchronize]

permissions:
  contents: read

env:
  CI: true
  NEXT_TELEMETRY_DISABLED: 1
  SEARCH_INDEXING_ENABLED: false

jobs:
  format:
    name: Capture formatted addresses HTTP test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out exact PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Format target test
        run: pnpm exec prettier --write apps/api/src/addresses/current-organization-addresses.input.spec.ts

      - name: Upload formatted test
        uses: actions/upload-artifact@v4
        with:
          name: formatted-addresses-http-input-test-${{ github.event.pull_request.head.sha }}
          path: apps/api/src/addresses/current-organization-addresses.input.spec.ts
          if-no-files-found: error
          retention-days: 1
