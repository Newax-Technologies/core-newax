name: Diagnose Organization Addresses Typecheck

on:
  pull_request:
    branches:
      - agent/tenant-organization-boundary
    types: [synchronize]

permissions:
  contents: read

env:
  CI: true
  DATABASE_URL: postgresql://newax:newax_ci@localhost:5432/newax_ci?schema=public
  NEXT_TELEMETRY_DISABLED: 1
  SEARCH_INDEXING_ENABLED: false

jobs:
  diagnose:
    name: Capture TypeScript failure
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out exact PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Resolve workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run strict type-check
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm typecheck 2>&1 | tee typecheck.log

      - name: Upload bounded diagnostic
        if: steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: addresses-typecheck-${{ github.event.pull_request.head.sha }}
          path: typecheck.log
          if-no-files-found: error
          retention-days: 1

      - name: Fail when type-check fails
        if: steps.typecheck.outcome == 'failure'
        run: exit 1
