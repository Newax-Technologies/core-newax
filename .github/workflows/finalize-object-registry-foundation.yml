name: Finalize Object Registry Foundation

on:
  pull_request:
    branches:
      - agent/current-organization-addresses-http-api
    types: [opened, synchronize, reopened]

permissions:
  contents: write

env:
  CI: true
  DATABASE_URL: postgresql://newax:newax_ci@localhost:5432/newax_ci?schema=public
  NEXT_TELEMETRY_DISABLED: 1
  SEARCH_INDEXING_ENABLED: false

jobs:
  finalize:
    name: Build and verify Object Registry candidate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: newax_ci
          POSTGRES_PASSWORD: newax_ci
          POSTGRES_USER: newax
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U newax -d newax_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out exact PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Integrate Object Registry composition and governance
        run: python tools/integrate-object-registry.py

      - name: Generate workspace lockfile
        run: pnpm install --no-frozen-lockfile

      - name: Apply repository formatting
        run: pnpm format

      - name: Generate Prisma client
        run: pnpm --filter @newax/api db:generate

      - name: Validate database schema
        run: pnpm --filter @newax/api db:validate

      - name: Apply database migrations
        run: pnpm --filter @newax/api db:migrate:deploy

      - name: Verify migration status
        run: pnpm --filter @newax/api exec prisma migrate status

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Commit verified candidate
        shell: bash
        run: |
          set -euo pipefail
          rm tools/integrate-object-registry.py
          git config user.name 'NEWAX Engineering Automation'
          git config user.email 'engineering@newax.co'
          git add -A
          if git diff --cached --quiet; then
            echo 'No candidate changes were produced.'
            exit 1
          fi
          git commit -m 'Finalize Object Registry foundation candidate'
          git push origin HEAD:agent/object-registry-foundation
