name: Prepare Authentication PR

on:
  pull_request:
    branches:
      - agent/user-registry-services

permissions:
  contents: write

concurrency:
  group: prepare-authentication-pr
  cancel-in-progress: false

jobs:
  prepare:
    if: ${{ github.head_ref == 'agent/authentication-services' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/authentication-services

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Prepare authentication foundation files
        run: |
          node tooling/prepare-authentication.mjs
          node tooling/harden-authentication.mjs

      - name: Update workspace lockfile
        run: pnpm install --lockfile-only

      - name: Format changed files
        run: |
          pnpm --filter @newax/api db:format
          pnpm exec prettier --write \
            apps/api/package.json \
            apps/api/src/app.module.ts \
            apps/api/src/authentication \
            apps/api/src/config/environment.ts \
            apps/api/src/config/environment.spec.ts \
            docs/decisions/README.md \
            docs/decisions/0017-build-authentication-service-foundation.md \
            packages/auth \
            packages/users/src/services/user-authentication-gateway.ts \
            registry/module-registry.json \
            tooling/prepare-authentication.mjs \
            tooling/harden-authentication.mjs

      - name: Commit prepared files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            pnpm-lock.yaml \
            registry/module-registry.json \
            apps/api \
            packages/auth \
            packages/users/src/services/user-authentication-gateway.ts \
            docs/decisions \
            tooling/prepare-authentication.mjs \
            tooling/harden-authentication.mjs

          if git diff --cached --quiet; then
            echo "Authentication files are already prepared."
            exit 0
          fi

          git commit -m "Prepare authentication workspace [skip auth prepare]"
          git push origin HEAD:agent/authentication-services
