name: Format Person Relationship Foundation Temporary

on:
  pull_request:
    types:
      - synchronize

permissions:
  contents: write

jobs:
  format:
    if: >-
      github.head_ref == 'agent/person-relationship-foundation' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v7
        with:
          ref: agent/person-relationship-foundation
          fetch-depth: 1
          persist-credentials: true

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply repository formatting
        run: pnpm format

      - name: Verify formatting
        run: pnpm format:check

      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/api/prisma/migrations/20260715190000_add_person_relationship_foundation/migration.sql \
            apps/api/prisma/schema.prisma \
            apps/api/src/database/person-relationship-database.spec.ts \
            apps/api/src/database/person-relationship-schema.spec.ts \
            packages/people/CHANGELOG.md \
            packages/people/README.md \
            packages/people/VERSION \
            packages/people/package.json \
            registry/module-registry.json \
            tooling/database-registry/explain.js
          if git diff --cached --quiet; then
            echo "No formatting changes required."
          else
            git commit -m "Format person relationship foundation"
            git push origin HEAD:agent/person-relationship-foundation
          fi
