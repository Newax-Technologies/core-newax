name: Fix Authentication Formatting

on:
  push:
    branches:
      - agent/authentication-services

permissions:
  contents: write

jobs:
  fix:
    if: ${{ !contains(github.event.head_commit.message, '[skip auth formatter]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/authentication-services

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - run: pnpm install --frozen-lockfile

      - name: Apply repository formatter
        run: pnpm exec prettier --write apps/api/src/authentication/node-authentication-security.ts

      - name: Commit formatted file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/api/src/authentication/node-authentication-security.ts
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Format authentication security adapter [skip auth formatter] [skip auth format]"
          git push origin HEAD:agent/authentication-services
