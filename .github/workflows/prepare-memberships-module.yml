name: Prepare Memberships Module

on:
  push:
    branches:
      - agent/membership-registry-services

permissions:
  contents: write

concurrency:
  group: prepare-memberships-module
  cancel-in-progress: false

jobs:
  prepare:
    if: ${{ !contains(github.event.head_commit.message, '[skip memberships prepare]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/membership-registry-services

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Update workspace lockfile
        run: pnpm install --lockfile-only

      - name: Update module registry and ADR index
        run: |
          node <<'EOF'
          const fs = require('node:fs');

          const registryPath = 'registry/module-registry.json';
          const registry = JSON.parse(fs.readFileSync(registryPath, 'utf8'));
          const memberships = registry.modules.find(
            (module) => module.module_key === 'memberships',
          );

          if (!memberships) {
            throw new Error('Memberships module registry entry was not found.');
          }

          registry.registry_version = '0.1.3';
          registry.last_updated = '2026-07-11';
          memberships.module_status = 'draft';
          memberships.required_permissions = [
            'memberships.view',
            'memberships.create',
            'memberships.update',
            'memberships.remove',
          ];
          memberships.exposed_events = [
            'membership.created',
            'membership.updated',
            'membership.removed',
          ];
          memberships.configuration_options = [
            'membership_status_values',
            'membership_type_values',
          ];
          memberships.database_ownership = [
            'core_memberships',
            'core_membership_roles',
          ];

          fs.writeFileSync(registryPath, `${JSON.stringify(registry, null, 2)}\n`);

          const indexPath = 'docs/decisions/README.md';
          let index = fs.readFileSync(indexPath, 'utf8');
          const adr13Row =
            '| [ADR 0013](0013-build-people-registry-service-foundation.md)            | Accepted | Build the reusable People Registry service foundation with permission-controlled identity and identifier operations.                            |';
          const adr14Row =
            '| [ADR 0014](0014-build-memberships-registry-service-foundation.md)       | Accepted | Build the organization-scoped Memberships Registry service foundation connecting people to organizations.                                      |';

          if (!index.includes(adr13Row)) {
            throw new Error('ADR 0013 index row was not found.');
          }

          index = index.replace(adr13Row, `${adr13Row}\n${adr14Row}`);
          index = index.replace(
            'rather than thirteen independent opinions',
            'rather than fourteen independent opinions',
          );
          index = index.replace(
            '- ADR 0013 defines the first reusable People Registry service and identifier-protection rules.',
            '- ADR 0013 defines the first reusable People Registry service and identifier-protection rules.\n- ADR 0014 defines organization-scoped memberships and non-destructive membership lifecycle rules.',
          );
          index = index.replace(
            '0014-define-repository-bootstrap-and-boundary-enforcement.md',
            '0015-define-repository-bootstrap-and-boundary-enforcement.md',
          );

          fs.writeFileSync(indexPath, index);
          EOF

      - name: Format changed files
        run: |
          pnpm exec prettier --write \
            apps/api/package.json \
            apps/api/src/app.module.ts \
            apps/api/src/memberships \
            docs/decisions/README.md \
            docs/decisions/0014-build-memberships-registry-service-foundation.md \
            packages/memberships \
            registry/module-registry.json

      - name: Commit prepared files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml registry/module-registry.json apps/api packages/memberships docs/decisions

          if git diff --cached --quiet; then
            echo "Memberships module files are already prepared."
            exit 0
          fi

          git commit -m "Prepare memberships module workspace [skip memberships prepare]"
          git push origin HEAD:agent/membership-registry-services
