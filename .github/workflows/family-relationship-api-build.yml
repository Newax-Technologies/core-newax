name: Build Family Relationship API Temporary

on:
  pull_request:
    types:
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  build:
    if: >-
      github.head_ref == 'agent/family-relationship-api-sensitive-read' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: newax
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d newax"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/newax

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v7
        with:
          ref: agent/family-relationship-api-sensitive-read
          fetch-depth: 1
          persist-credentials: true

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply reviewed family relationship patch
        id: patch
        continue-on-error: true
        run: |
          set +e
          python tooling/temp-build-family-relationship-api.py > /tmp/family-relationship-patch.log 2>&1
          status=$?
          set -e
          cat /tmp/family-relationship-patch.log
          exit "$status"

      - name: Upload patch diagnostic
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: family-relationship-patch-${{ github.sha }}
          path: /tmp/family-relationship-patch.log
          if-no-files-found: error
          retention-days: 1

      - name: Enforce patch result
        if: steps.patch.outcome == 'failure'
        run: exit 1

      - name: Generate and normalize
        run: |
          pnpm --filter @newax/api db:format
          pnpm --filter @newax/api db:generate
          pnpm format

      - name: Apply migrations
        run: pnpm --filter @newax/api db:migrate:deploy

      - name: Verify focused slice
        run: |
          pnpm format:check
          pnpm lint
          pnpm --filter @newax/people typecheck
          pnpm --filter @newax/people test
          pnpm --filter @newax/api typecheck
          pnpm --filter @newax/api exec vitest run \
            src/people/current-organization-family-relationships.input.spec.ts \
            src/database/person-relationship-operations-schema.spec.ts \
            src/database/person-relationship-operations-database.spec.ts
          pnpm database-registry:test
          pnpm --filter @newax/api build

      - name: Commit implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/api packages/people registry/module-registry.json tooling/database-registry/explain.js
          git commit -m "Build governed family relationship API"
          git push origin HEAD:agent/family-relationship-api-sensitive-read
