name: Capture HTTP Security Typecheck

on:
  push:
    branches:
      - agent/http-security-boundary

permissions:
  contents: write

jobs:
  capture:
    if: ${{ !contains(github.event.head_commit.message, '[skip http typecheck capture]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/http-security-boundary

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - run: pnpm install --frozen-lockfile

      - name: Capture type-check diagnostics
        run: pnpm typecheck > http-typecheck-report.txt 2>&1 || true

      - name: Commit type-check diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add http-typecheck-report.txt
          git commit -m "Capture HTTP security type-check diagnostics [skip http typecheck capture]"
          git push origin HEAD:agent/http-security-boundary
