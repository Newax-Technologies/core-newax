name: Format Current Organization Read

on:
  push:
    branches:
      - agent/current-organization-read-api

permissions:
  contents: write

jobs:
  format:
    if: ${{ !contains(github.event.head_commit.message, '[skip current organization formatter]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/current-organization-read-api

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - run: pnpm install --frozen-lockfile

      - name: Apply repository formatter
        run: |
          pnpm exec prettier --write \
            apps/api/src/organizations/current-organization.controller.ts \
            apps/api/src/organizations/current-organization.controller.spec.ts \
            apps/api/src/organizations/organizations.module.ts \
            docs/decisions/0023-build-current-organization-read-api.md \
            docs/decisions/README.md \
            packages/organizations/CHANGELOG.md \
            packages/organizations/README.md \
            packages/organizations/src/errors/organization-module-error.ts \
            packages/organizations/src/index.ts \
            packages/organizations/src/services/organizations.service.ts \
            packages/organizations/src/types/organization.ts \
            packages/organizations/tests/current-organization-read.spec.ts

      - name: Commit formatted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            apps/api/src/organizations/current-organization.controller.ts \
            apps/api/src/organizations/current-organization.controller.spec.ts \
            apps/api/src/organizations/organizations.module.ts \
            docs/decisions/0023-build-current-organization-read-api.md \
            docs/decisions/README.md \
            packages/organizations/CHANGELOG.md \
            packages/organizations/README.md \
            packages/organizations/src/errors/organization-module-error.ts \
            packages/organizations/src/index.ts \
            packages/organizations/src/services/organizations.service.ts \
            packages/organizations/src/types/organization.ts \
            packages/organizations/tests/current-organization-read.spec.ts

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "Format current organization read slice [skip current organization formatter]"
          git push origin HEAD:agent/current-organization-read-api
