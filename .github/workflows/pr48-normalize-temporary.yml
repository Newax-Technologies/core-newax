name: Normalize PR 48 Temporary

on:
  pull_request:
    types:
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  normalize:
    if: >-
      github.head_ref == 'agent/certificate-import-evidence-staging' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v7
        with:
          ref: agent/certificate-import-evidence-staging
          fetch-depth: 1
          persist-credentials: true

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Normalize source
        run: |
          pnpm --filter @newax/api db:format
          pnpm format
          pnpm lint:fix
          pnpm format

      - name: Commit normalized source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Normalize certificate import implementation"
          git push origin HEAD:agent/certificate-import-evidence-staging
