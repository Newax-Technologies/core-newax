name: Pull Request Governance

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review

permissions:
  actions: read
  contents: read
  issues: read
  pull-requests: read

concurrency:
  group: pr-governance-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify-learning-record:
    name: Verify engineering learning record
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Verify pull-request governance structure
        run: node tooling/verify-pr-governance.mjs

      - name: Reconcile workflow failures and learning evidence
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node tooling/run-pr-learning-reconciliation.mjs
