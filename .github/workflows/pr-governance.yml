name: Pull Request Governance

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review

permissions:
  actions: read
  contents: read
  issues: read
  pull-requests: read

concurrency:
  group: pr-governance-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify-learning-record:
    name: Verify engineering learning record
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out candidate pull request
        uses: actions/checkout@v7
        with:
          path: candidate
          persist-credentials: false

      - name: Check out trusted base controls
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: trusted
          persist-credentials: false

      - name: Select trusted governance controls
        shell: bash
        run: |
          if test -f trusted/tooling/verify-pr-governance.mjs; then
            echo "NEWAX_GOVERNANCE_ROOT=trusted" >> "$GITHUB_ENV"
          else
            echo "NEWAX_GOVERNANCE_ROOT=candidate" >> "$GITHUB_ENV"
            echo "Bootstrap fallback: the protected base does not yet contain governance controls."
          fi

      - name: Verify pull-request governance structure
        run: node "$NEWAX_GOVERNANCE_ROOT/tooling/verify-pr-governance.mjs"

      - name: Reconcile workflow failures and learning evidence
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node "$NEWAX_GOVERNANCE_ROOT/tooling/run-pr-learning-reconciliation.mjs"

      - name: Verify root-cause decisions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if test -f "$NEWAX_GOVERNANCE_ROOT/tooling/verify-root-cause-governance.mjs"; then
            node "$NEWAX_GOVERNANCE_ROOT/tooling/verify-root-cause-governance.mjs"
          else
            echo "Root-cause governance activates after its controls reach the protected base."
          fi

      - name: Detect planning mistakes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if test -f "$NEWAX_GOVERNANCE_ROOT/tooling/verify-pr-planning.mjs"; then
            node "$NEWAX_GOVERNANCE_ROOT/tooling/verify-pr-planning.mjs"
          elif test -f candidate/tooling/verify-pr-planning.mjs; then
            echo "Bootstrap fallback: planning controls are running from the candidate branch."
            node candidate/tooling/verify-pr-planning.mjs
          else
            echo "Planning mistake detection activates after its controls reach the protected base."
          fi
