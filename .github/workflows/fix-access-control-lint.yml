name: Fix Access Control Lint

on:
  push:
    branches:
      - agent/access-control-services

permissions:
  contents: write

jobs:
  fix:
    if: ${{ !contains(github.event.head_commit.message, '[skip access fix]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/access-control-services

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - run: pnpm install --frozen-lockfile

      - name: Apply repository lint fixes
        run: |
          pnpm exec eslint --fix \
            apps/api/src/access-control/prisma-access-control.repository.ts \
            packages/access-control/src/services/access-control.service.ts \
            packages/access-control/tests/access-control.service.spec.ts
          pnpm exec prettier --write \
            apps/api/src/access-control/prisma-access-control.repository.ts \
            packages/access-control/src/services/access-control.service.ts \
            packages/access-control/tests/access-control.service.spec.ts

      - name: Commit lint fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/api/src/access-control packages/access-control
          git commit -m "Fix access control lint [skip access fix] [skip access lint]"
          git push origin HEAD:agent/access-control-services
