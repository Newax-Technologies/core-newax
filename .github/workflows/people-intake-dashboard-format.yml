name: Format People Intake Dashboard Temporary

on:
  pull_request:
    types:
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  format:
    if: >-
      github.head_ref == 'agent/family-intake-verification-dashboard' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v7
        with:
          ref: agent/family-intake-verification-dashboard
          fetch-depth: 1
          persist-credentials: true

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply canonical formatting
        run: |
          pnpm --filter @newax/api db:format
          pnpm format
          pnpm format:check

      - name: Commit canonical formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md \
            apps/api \
            apps/web \
            docs/decisions/0025-stage-and-verify-people-intake-before-canonical-application.md \
            packages/people-intake \
            pnpm-lock.yaml \
            registry/module-registry.json \
            tooling/database-registry/explain.js
          if git diff --cached --quiet; then
            echo "No formatting changes required."
          else
            git commit -m "Format People Intake dashboard implementation"
            git push origin HEAD:agent/family-intake-verification-dashboard
          fi
