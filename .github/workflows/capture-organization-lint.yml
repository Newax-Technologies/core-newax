name: Capture Organization Lint

on:
  push:
    branches:
      - agent/organization-registry-services

permissions:
  contents: write

jobs:
  capture:
    if: ${{ !contains(github.event.head_commit.message, '[skip lint capture]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/organization-registry-services

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - run: pnpm install --frozen-lockfile

      - name: Capture lint diagnostics
        run: pnpm lint > organization-lint-report.txt 2>&1 || true

      - name: Commit lint report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add organization-lint-report.txt
          git commit -m "Capture organization lint diagnostics [skip lint capture]"
          git push origin HEAD:agent/organization-registry-services
