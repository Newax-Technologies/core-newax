name: Format HTTP Security Final

on:
  push:
    branches:
      - agent/http-security-boundary

permissions:
  contents: write

jobs:
  format:
    if: ${{ !contains(github.event.head_commit.message, '[skip http formatter]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/http-security-boundary

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - run: pnpm install --frozen-lockfile

      - name: Apply repository formatter
        run: |
          pnpm exec prettier --write \
            apps/api/src/main.ts \
            apps/api/src/config/http-security-environment.ts \
            apps/api/src/config/http-security-environment.spec.ts \
            apps/api/src/http-security/http-boundary.middleware.ts \
            apps/api/src/http-security/http-boundary.middleware.spec.ts \
            packages/http-security/src/services/request-origin-policy.ts \
            packages/http-security/tests/request-origin-policy.spec.ts

      - name: Commit formatted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            apps/api/src/main.ts \
            apps/api/src/config/http-security-environment.ts \
            apps/api/src/config/http-security-environment.spec.ts \
            apps/api/src/http-security/http-boundary.middleware.ts \
            apps/api/src/http-security/http-boundary.middleware.spec.ts \
            packages/http-security/src/services/request-origin-policy.ts \
            packages/http-security/tests/request-origin-policy.spec.ts

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "Format final HTTP security hardening [skip http formatter]"
          git push origin HEAD:agent/http-security-boundary
