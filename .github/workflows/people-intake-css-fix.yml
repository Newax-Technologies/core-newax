name: Fix People Intake CSS Temporary

on:
  pull_request:
    types:
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  fix:
    if: >-
      github.head_ref == 'agent/family-intake-verification-dashboard' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v7
        with:
          ref: agent/family-intake-verification-dashboard
          fetch-depth: 1
          persist-credentials: true

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply reviewed CSS module fix
        run: python tooling/temp-fix-people-intake-css.py

      - name: Verify production web build
        run: |
          pnpm format
          pnpm format:check
          pnpm --filter @newax/web build

      - name: Commit CSS module fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/app/internal/people-intake/people-intake-dashboard.module.css
          git commit -m "Scope People Intake dashboard CSS"
          git push origin HEAD:agent/family-intake-verification-dashboard
