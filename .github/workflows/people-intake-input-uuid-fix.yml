name: Fix People Intake Client UUID Validation Temporary

on:
  pull_request:
    types:
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  fix:
    if: >-
      github.head_ref == 'agent/family-intake-verification-dashboard' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v7
        with:
          ref: agent/family-intake-verification-dashboard
          fetch-depth: 1
          persist-credentials: true

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply reviewed UUID validation fix
        run: python tooling/temp-fix-people-intake-input-uuid.py

      - name: Apply canonical formatting
        run: pnpm format

      - name: Verify formatting
        run: pnpm format:check

      - name: Verify lint
        run: pnpm lint

      - name: Type-check People Intake package
        run: pnpm --filter @newax/people-intake typecheck

      - name: Test People Intake package
        id: people_intake_test
        continue-on-error: true
        run: |
          set -o pipefail
          pnpm --filter @newax/people-intake test 2>&1 | tee people-intake-test.log

      - name: Upload focused test diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: people-intake-uuid-regression-${{ github.run_id }}
          path: people-intake-test.log
          if-no-files-found: error
          retention-days: 1

      - name: Enforce focused test result
        if: steps.people_intake_test.outcome != 'success'
        run: exit 1

      - name: Commit UUID validation fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/people-intake/src/services/people-intake.service.ts \
            packages/people-intake/src/services/people-intake.service.spec.ts
          git commit -m "Classify malformed People Intake IDs as invalid input"
          git push origin HEAD:agent/family-intake-verification-dashboard
