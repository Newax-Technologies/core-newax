name: Apply Person Relationship Foundation PR Temporary

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  apply:
    if: >-
      github.head_ref == 'agent/person-relationship-foundation' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v7
        with:
          ref: agent/person-relationship-foundation
          fetch-depth: 1
          persist-credentials: true

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Extract and run reviewed patch
        run: |
          python - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/person-relationship-foundation-apply.yml').read_text().splitlines()
          start = workflow.index('      - name: Apply person relationship foundation')
          run_line = workflow.index('        run: |', start)
          end = workflow.index('      - name: Normalize generated and source files', run_line)
          script = []
          for line in workflow[run_line + 1:end]:
              if line.startswith('          '):
                  script.append(line[10:])
              elif line.strip():
                  raise SystemExit(f'Unexpected indentation in reviewed patch: {line!r}')
              else:
                  script.append('')
          Path('/tmp/apply-person-relationship.sh').write_text('\n'.join(script) + '\n')
          PY
          bash /tmp/apply-person-relationship.sh

      - name: Normalize and validate focused foundation
        run: |
          pnpm --filter @newax/api db:format
          pnpm format
          pnpm --filter @newax/api db:validate
          pnpm database-registry:test
          pnpm --filter @newax/api exec vitest run src/database/person-relationship-schema.spec.ts

      - name: Commit foundation changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/api/prisma/schema.prisma \
            apps/api/prisma/migrations/20260715190000_add_person_relationship_foundation/migration.sql \
            apps/api/src/database/person-relationship-schema.spec.ts \
            registry/module-registry.json \
            packages/people/package.json \
            packages/people/VERSION \
            packages/people/README.md \
            packages/people/CHANGELOG.md \
            tooling/database-registry/explain.js
          git commit -m "Add person relationship registry foundation"
          git push origin HEAD:agent/person-relationship-foundation
