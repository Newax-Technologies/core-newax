name: Format Organization Integration

on:
  push:
    branches:
      - agent/organization-registry-services

permissions:
  contents: write

jobs:
  format:
    if: ${{ !contains(github.event.head_commit.message, '[skip integration format]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/organization-registry-services

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - run: pnpm install --frozen-lockfile

      - run: |
          pnpm exec prettier --write \
            apps/api/package.json \
            apps/api/src/organizations/prisma-organization.repository.ts

      - name: Commit formatted integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/api/package.json apps/api/src/organizations/prisma-organization.repository.ts
          git commit -m "Format organization integration [skip integration format]"
          git push origin HEAD:agent/organization-registry-services
