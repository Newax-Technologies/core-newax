name: Generate Central Registry Migration

on:
  push:
    branches:
      - agent/central-registry-foundation

permissions:
  contents: write

concurrency:
  group: generate-central-registry-migration
  cancel-in-progress: false

jobs:
  generate:
    if: ${{ !contains(github.event.head_commit.message, '[skip migration]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: agent/central-registry-foundation

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Prisma schema
        run: pnpm --filter @newax/api db:validate

      - name: Generate initial migration
        run: |
          migration_dir="apps/api/prisma/migrations/20260711160000_initialize_central_registry"
          mkdir -p "$migration_dir"
          pnpm --filter @newax/api exec prisma migrate diff \
            --from-empty \
            --to-schema prisma/schema.prisma \
            --script > "$migration_dir/migration.sql"

          cat > apps/api/prisma/migrations/migration_lock.toml <<'EOF'
          # Please do not edit this file manually
          # It should be added in your version-control system (i.e. Git)
          provider = "postgresql"
          EOF

      - name: Commit generated migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/api/prisma/migrations

          if git diff --cached --quiet; then
            echo "Migration is already current."
            exit 0
          fi

          git commit -m "Generate initial central registry migration [skip migration]"
          git push origin HEAD:agent/central-registry-foundation
