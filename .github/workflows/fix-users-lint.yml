name: Fix Users Lint

on:
  push:
    branches:
      - agent/user-registry-services

permissions:
  contents: write

jobs:
  fix:
    if: ${{ !contains(github.event.head_commit.message, '[skip users fix]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/user-registry-services

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - run: pnpm install --frozen-lockfile

      - name: Apply users lint fixes
        run: |
          node <<'EOF'
          const fs = require('node:fs');
          const path = 'packages/users/src/services/users.service.ts';
          let source = fs.readFileSync(path, 'utf8');
          source = source.replace('  UserStatus,\n', '');
          fs.writeFileSync(path, source);
          EOF
          pnpm exec eslint --fix apps/api/src/users packages/users
          pnpm exec prettier --write apps/api/src/users packages/users
          pnpm lint

      - name: Commit lint fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/api/src/users packages/users
          if git diff --cached --quiet; then
            echo "Users lint is already clean."
            exit 0
          fi
          git commit -m "Fix users lint [skip users fix] [skip users lint]"
          git push origin HEAD:agent/user-registry-services
