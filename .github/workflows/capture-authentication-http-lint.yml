name: Capture Authentication HTTP Lint

on:
  push:
    branches:
      - agent/authentication-http-endpoints

permissions:
  contents: write

jobs:
  capture:
    if: ${{ !contains(github.event.head_commit.message, '[skip authentication http lint capture]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/authentication-http-endpoints

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - run: pnpm install --frozen-lockfile

      - name: Capture lint diagnostics
        run: pnpm lint > authentication-http-lint-report.txt 2>&1 || true

      - name: Commit lint diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add authentication-http-lint-report.txt
          git commit -m "Capture authentication HTTP lint diagnostics [skip authentication http lint capture]"
          git push origin HEAD:agent/authentication-http-endpoints
