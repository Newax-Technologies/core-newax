name: Build Certificate Import Evidence Temporary

on:
  pull_request:
    types:
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  build:
    if: >-
      github.head_ref == 'agent/certificate-import-evidence-staging' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: newax
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d newax"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/newax

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v7
        with:
          ref: agent/certificate-import-evidence-staging
          fetch-depth: 1
          persist-credentials: true

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply reviewed implementation
        id: patch
        continue-on-error: true
        run: |
          set +e
          python tooling/temp-build-certificate-import-evidence.py > /tmp/certificate-import-patch.log 2>&1
          status=$?
          set -e
          cat /tmp/certificate-import-patch.log
          exit "$status"

      - name: Upload patch diagnostic
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: certificate-import-patch-${{ github.sha }}
          path: /tmp/certificate-import-patch.log
          if-no-files-found: error
          retention-days: 1

      - name: Enforce patch result
        if: steps.patch.outcome == 'failure'
        run: exit 1

      - name: Generate and normalize
        run: |
          pnpm --filter @newax/api db:format
          pnpm --filter @newax/api db:generate
          pnpm format

      - name: Apply migrations
        run: pnpm --filter @newax/api db:migrate:deploy

      - name: Verify formatting
        run: pnpm format:check

      - name: Verify lint
        id: lint
        continue-on-error: true
        run: |
          set +e
          pnpm lint > /tmp/certificate-import-lint.log 2>&1
          status=$?
          set -e
          cat /tmp/certificate-import-lint.log
          exit "$status"

      - name: Upload lint diagnostic
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: certificate-import-lint-${{ github.sha }}
          path: /tmp/certificate-import-lint.log
          if-no-files-found: error
          retention-days: 1

      - name: Enforce lint result
        if: steps.lint.outcome == 'failure'
        run: exit 1

      - name: Type-check People Intake
        run: pnpm --filter @newax/people-intake typecheck

      - name: Test People Intake
        run: pnpm --filter @newax/people-intake test

      - name: Type-check API
        run: pnpm --filter @newax/api typecheck

      - name: Test focused API and PostgreSQL behavior
        run: |
          pnpm --filter @newax/api exec vitest run \
            src/database/certificate-import-evidence-schema.spec.ts \
            src/people-intake/current-organization-certificate-imports.input.spec.ts

      - name: Type-check web
        run: pnpm --filter @newax/web typecheck

      - name: Test web
        run: pnpm --filter @newax/web test

      - name: Test registry generator
        run: pnpm database-registry:test

      - name: Build API and web
        run: |
          pnpm --filter @newax/api build
          pnpm --filter @newax/web build

      - name: Commit implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/api apps/web packages/people-intake registry/module-registry.json
          git commit -m "Build certificate import and evidence staging"
          git push origin HEAD:agent/certificate-import-evidence-staging
