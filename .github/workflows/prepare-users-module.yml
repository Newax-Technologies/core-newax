name: Prepare Users Module

on:
  push:
    branches:
      - agent/user-registry-services

permissions:
  contents: write

concurrency:
  group: prepare-users-module
  cancel-in-progress: false

jobs:
  prepare:
    if: ${{ !contains(github.event.head_commit.message, '[skip users prepare]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/user-registry-services

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Update workspace lockfile
        run: pnpm install --lockfile-only

      - name: Update module registry and ADR index
        run: |
          node <<'EOF'
          const fs = require('node:fs');

          const registryPath = 'registry/module-registry.json';
          const registry = JSON.parse(fs.readFileSync(registryPath, 'utf8'));
          const users = registry.modules.find((module) => module.module_key === 'users');
          if (!users) {
            throw new Error('Users module registry entry was not found.');
          }

          registry.registry_version = '0.1.5';
          registry.last_updated = '2026-07-11';
          users.module_status = 'draft';
          users.description =
            'Maintains global login-capable accounts linked to central people while organization access remains membership and permission controlled.';
          users.dependencies = [
            { module_key: 'people', version: '>=0.1.0' },
            { module_key: 'organizations', version: '>=0.1.0' },
            { module_key: 'memberships', version: '>=0.1.0' },
          ];
          users.required_permissions = [
            'users.view',
            'users.create',
            'users.suspend',
            'users.disable',
            'users.enable',
            'users.archive',
            'users.identities.view',
            'users.identities.manage',
          ];
          users.exposed_events = [
            'user.created',
            'user.suspended',
            'user.disabled',
            'user.enabled',
            'user.archived',
            'user.identity_added',
            'user.identity_removed',
            'user.primary_identity_changed',
          ];
          users.consumed_events = ['person.archived'];
          users.configuration_options = [
            'account_status_values',
            'login_identity_types',
            'identity_normalization_policy',
          ];
          users.database_ownership = ['core_users', 'core_user_identities'];
          users.tenant_scope = 'global_account_with_organization_scoped_access';
          users.documentation_path = 'packages/users/README.md';
          users.changelog_path = 'packages/users/CHANGELOG.md';
          users.compatibility_notes =
            'A person may exist without a user account. One global user may access multiple organizations only through approved memberships and permissions.';
          fs.writeFileSync(registryPath, `${JSON.stringify(registry, null, 2)}\n`);

          const indexPath = 'docs/decisions/README.md';
          let index = fs.readFileSync(indexPath, 'utf8');
          const adr15 =
            '| [ADR 0015](0015-consolidate-roles-and-permissions-into-access-control.md) | Accepted | Consolidate roles, permissions, membership-role assignments, templates, and evaluation into one Access Control bounded context.                 |';
          const adr16 =
            '| [ADR 0016](0016-build-users-registry-service-foundation.md)              | Accepted | Build the global Users Registry service foundation while preserving organization-scoped access through memberships and permissions.             |';
          if (!index.includes(adr15)) {
            throw new Error('ADR 0015 index row was not found.');
          }
          index = index.replace(adr15, `${adr15}\n${adr16}`);
          index = index.replace(
            'rather than fifteen independent opinions',
            'rather than sixteen independent opinions',
          );
          index = index.replace(
            '- ADR 0015 consolidates role, permission, assignment, template, and evaluation rules into Access Control.',
            '- ADR 0015 consolidates role, permission, assignment, template, and evaluation rules into Access Control.\n- ADR 0016 defines global user accounts, organization-scoped creation, and platform-scoped account lifecycle rules.',
          );
          index = index.replace(
            '0016-define-repository-bootstrap-and-boundary-enforcement.md',
            '0017-define-repository-bootstrap-and-boundary-enforcement.md',
          );
          fs.writeFileSync(indexPath, index);
          EOF

      - name: Format changed files
        run: |
          pnpm exec prettier --write \
            apps/api/package.json \
            apps/api/src/app.module.ts \
            apps/api/src/users \
            docs/decisions/README.md \
            docs/decisions/0016-build-users-registry-service-foundation.md \
            packages/users \
            registry/module-registry.json

      - name: Commit prepared files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml registry/module-registry.json apps/api packages/users docs/decisions

          if git diff --cached --quiet; then
            echo "Users module files are already prepared."
            exit 0
          fi

          git commit -m "Prepare users module workspace [skip users prepare]"
          git push origin HEAD:agent/user-registry-services
