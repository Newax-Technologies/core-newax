name: Format Account Membership Discovery

on:
  push:
    branches:
      - agent/account-membership-discovery

permissions:
  contents: write

jobs:
  format:
    if: ${{ !contains(github.event.head_commit.message, '[skip account membership formatter]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/account-membership-discovery

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - run: pnpm install --frozen-lockfile

      - name: Apply repository formatter
        run: |
          pnpm exec prettier --write \
            apps/api/src/account-access \
            apps/api/src/app.module.ts \
            apps/api/src/request-context/prisma-account-membership-discovery.directory.ts \
            apps/api/src/request-context/request-context.module.ts \
            packages/request-context/src/index.ts \
            packages/request-context/src/services/account-membership-discovery.service.ts \
            packages/request-context/src/services/request-context-ports.ts \
            packages/request-context/src/types/request-context.ts \
            packages/request-context/tests/account-membership-discovery.service.spec.ts \
            packages/request-context/README.md \
            packages/request-context/CHANGELOG.md \
            docs/decisions/0021-build-account-membership-discovery.md \
            docs/decisions/README.md

      - name: Commit formatted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            apps/api/src/account-access \
            apps/api/src/app.module.ts \
            apps/api/src/request-context/prisma-account-membership-discovery.directory.ts \
            apps/api/src/request-context/request-context.module.ts \
            packages/request-context/src/index.ts \
            packages/request-context/src/services/account-membership-discovery.service.ts \
            packages/request-context/src/services/request-context-ports.ts \
            packages/request-context/src/types/request-context.ts \
            packages/request-context/tests/account-membership-discovery.service.spec.ts \
            packages/request-context/README.md \
            packages/request-context/CHANGELOG.md \
            docs/decisions/0021-build-account-membership-discovery.md \
            docs/decisions/README.md

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "Format account membership discovery [skip account membership formatter]"
          git push origin HEAD:agent/account-membership-discovery
