name: Align Request Context Layer

on:
  push:
    branches:
      - agent/trusted-request-context

permissions:
  contents: write

jobs:
  align:
    if: ${{ !contains(github.event.head_commit.message, '[skip context layer]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/trusted-request-context

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Align platform-service classification
        run: |
          node <<'EOF'
          const fs = require('node:fs');

          const registryPath = 'registry/module-registry.json';
          const registry = JSON.parse(fs.readFileSync(registryPath, 'utf8'));
          const requestContext = registry.modules.find(
            (item) => item.module_key === 'request-context',
          );
          if (!requestContext) {
            throw new Error('Request Context registry entry was not found.');
          }
          requestContext.module_layer = 'platform_service';
          fs.writeFileSync(
            registryPath,
            `${JSON.stringify(registry, null, 2)}\n`,
          );

          const readmePath = 'packages/request-context/README.md';
          let readme = fs.readFileSync(readmePath, 'utf8');
          readme = readme.replace(
            'Draft reusable foundation module.',
            'Draft reusable platform service.',
          );
          fs.writeFileSync(readmePath, readme);

          const adrPath =
            'docs/decisions/0018-build-trusted-request-context-foundation.md';
          let adr = fs.readFileSync(adrPath, 'utf8');
          adr = adr.replace(
            'NEWAX Core will provide a reusable `@newax/request-context` foundation package with:',
            'NEWAX Core will provide a reusable `@newax/request-context` platform service package with:',
          );
          adr = adr.replace(
            '- Always authorize business operations through permission codes rather than role names.',
            '- Always authorize business operations through permission codes rather than role names.\n- Foundation modules must not depend on Request Context; application and API layers adapt trusted context into foundation service contracts.',
          );
          fs.writeFileSync(adrPath, adr);
          EOF

      - run: pnpm install --frozen-lockfile

      - name: Format aligned files
        run: |
          pnpm exec prettier --write \
            registry/module-registry.json \
            packages/request-context/README.md \
            docs/decisions/0018-build-trusted-request-context-foundation.md

      - name: Commit aligned files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            registry/module-registry.json \
            packages/request-context/README.md \
            docs/decisions/0018-build-trusted-request-context-foundation.md

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "Classify trusted request context as platform service [skip context layer]"
          git push origin HEAD:agent/trusted-request-context
