name: Database Registry Review Fix Two Temporary

on:
  pull_request:

jobs:
  fix-review:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Install dependencies quietly
        run: pnpm install --frozen-lockfile > /tmp/install.log 2>&1

      - name: Apply bounded parser fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          parser_path = Path('tooling/database-registry/parsers.mjs')
          parser = parser_path.read_text()
          parser_lines = parser.splitlines()

          if 'const literalMatch = source.match' not in parser:
              prefix_start = parser_lines.index('export function detectGlobalPrefix(source) {')
              controller_start = parser_lines.index(
                  "export function parseControllersFromFiles(files, globalPrefix = '') {"
              )
              new_prefix = r'''export function detectGlobalPrefix(source) {
            const literalMatch = source.match(/\.setGlobalPrefix\(\s*(['"`])([^'"`]*)\1\s*\)/);
            if (literalMatch) {
              return literalMatch[2];
            }

            const identifierMatch = source.match(
              /\.setGlobalPrefix\(\s*([A-Za-z_$][A-Za-z0-9_$]*)\s*\)/,
            );
            if (!identifierMatch) {
              return '';
            }

            const declarationPattern =
              /\b(?:const|let|var)\s+([A-Za-z_$][A-Za-z0-9_$]*)\s*=\s*(['"`])([^'"`]*)\2/g;
            for (const declaration of source.matchAll(declarationPattern)) {
              if (declaration[1] === identifierMatch[1]) {
                return declaration[3];
              }
            }
            return '';
          }'''.splitlines()
              parser_lines[prefix_start:controller_start] = new_prefix + ['']

              controller_line = '    const controllerPrefix = controllerMatch[2];'
              controller_index = parser_lines.index(controller_line)
              class_context = r'''    const classDeclarationIndex = file.content.indexOf(
              'export class',
              controllerMatch.index,
            );
            const classDecoratorBlock =
              classDeclarationIndex === -1
                ? ''
                : file.content.slice(
                    controllerMatch.index + controllerMatch[0].length,
                    classDeclarationIndex,
                  );
            const classContext =
              classDecoratorBlock.includes('@PublicEndpoint') ||
              classDecoratorBlock.includes('@PublicAuthenticationEndpoint')
                ? 'public'
                : 'unspecified';'''.splitlines()
              parser_lines[controller_index + 1:controller_index + 1] = class_context

              context_start = parser_lines.index(
                  "      const context = decoratorBlock.includes('@OrganizationContextEndpoint')"
              )
              context_end = None
              for index in range(context_start, len(parser_lines)):
                  if parser_lines[index].strip() == ": 'unspecified';":
                      context_end = index + 1
                      break
              if context_end is None:
                  raise SystemExit('Endpoint context block end was not found')
              new_context = r'''      const context = decoratorBlock.includes('@OrganizationContextEndpoint')
                ? 'organization'
                : decoratorBlock.includes('@AccountContextEndpoint')
                  ? 'account'
                  : decoratorBlock.includes('@PublicEndpoint') ||
                      decoratorBlock.includes('@PublicAuthenticationEndpoint')
                    ? 'public'
                    : classContext;'''.splitlines()
              parser_lines[context_start:context_end] = new_context
              parser_path.write_text('\n'.join(parser_lines) + '\n')

          test_path = Path('tooling/database-registry/generate.test.mjs')
          tests = test_path.read_text()
          test_lines = tests.splitlines()

          constant_assertion = (
              'detectGlobalPrefix("const API_PREFIX = \'api\';\\napp.setGlobalPrefix(API_PREFIX);")'
          )
          if constant_assertion not in tests:
              direct_line = '  assert.equal(detectGlobalPrefix("app.setGlobalPrefix(\'api\');"), \'api\');'
              direct_index = test_lines.index(direct_line)
              extra_assertion = [
                  '  assert.equal(',
                  '    detectGlobalPrefix(',
                  '      "const API_PREFIX = \'api\';\\napp.setGlobalPrefix(API_PREFIX);",',
                  '    ),',
                  "    'api',",
                  '  );',
              ]
              test_lines[direct_index + 1:direct_index + 1] = extra_assertion

          public_test_name = "test('recognizes class-level and authentication public endpoint decorators', () => {"
          if public_test_name not in tests:
              migration_marker = "test('classifies migration operations and fingerprints source', () => {"
              migration_index = test_lines.index(migration_marker)
              public_test = r'''test('recognizes class-level and authentication public endpoint decorators', () => {
            const endpoints = parseControllersFromFiles(
              [
                {
                  path: 'health.controller.ts',
                  content: `
          @Controller('health')
          @PublicEndpoint()
          export class HealthController {
            @Get()
            getHealth() {}
          }
          `,
                },
                {
                  path: 'authentication.controller.ts',
                  content: `
          @Controller('auth')
          export class AuthenticationController {
            @Post('login')
            @HttpCode(200)
            @PublicAuthenticationEndpoint()
            login() {}
          }
          `,
                },
              ],
              'api',
            );

            assert.deepEqual(
              endpoints.map(({ method, path, context, successCode }) => ({
                method,
                path,
                context,
                successCode,
              })),
              [
                { method: 'POST', path: '/api/auth/login', context: 'public', successCode: 200 },
                { method: 'GET', path: '/api/health', context: 'public', successCode: 200 },
              ],
            );
          });
          '''.splitlines()
              test_lines[migration_index:migration_index] = public_test + ['']

          test_path.write_text('\n'.join(test_lines) + '\n')
          PY

      - name: Normalize and verify reviewed fixes
        run: |
          pnpm exec eslint tooling/database-registry/parsers.mjs tooling/database-registry/generate.test.mjs --fix
          pnpm exec prettier --write tooling/database-registry/parsers.mjs tooling/database-registry/generate.test.mjs
          pnpm exec eslint tooling/database-registry/parsers.mjs tooling/database-registry/generate.test.mjs --max-warnings=0
          pnpm exec prettier --check tooling/database-registry/parsers.mjs tooling/database-registry/generate.test.mjs
          node --test tooling/database-registry/generate.test.mjs

      - name: Commit reviewed fixes
        run: |
          if git diff --quiet; then
            echo "Reviewed parser fixes are already present."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tooling/database-registry/parsers.mjs tooling/database-registry/generate.test.mjs
          git commit -m "Fix database registry API discovery accuracy"
          git push
