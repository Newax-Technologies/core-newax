name: Engineering Failure Audit

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: engineering-failure-audit
  cancel-in-progress: true

jobs:
  audit-failed-runs:
    name: Audit failed workflow runs
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out default branch controls
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Capture uncatalogued failures
        env:
          ENGINEERING_AUDIT_HOURS: 168
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node tooling/audit-workflow-failures.mjs
