name: Capture Authentication Formatting

on:
  push:
    branches:
      - agent/authentication-services

permissions:
  contents: write

jobs:
  capture:
    if: ${{ !contains(github.event.head_commit.message, '[skip auth format]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/authentication-services

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - run: pnpm install --frozen-lockfile

      - name: Capture formatting diagnostics
        run: pnpm format:check > authentication-format-report.txt 2>&1 || true

      - name: Commit formatting report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add authentication-format-report.txt
          git commit -m "Capture authentication formatting diagnostics [skip auth format]"
          git push origin HEAD:agent/authentication-services
