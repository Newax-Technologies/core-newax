name: Apply Family Relationship API Audit Fix Temporary

on:
  pull_request:
    types:
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  fix:
    if: >-
      github.head_ref == 'agent/family-relationship-api-sensitive-read' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: newax
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d newax"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/newax

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v7
        with:
          ref: agent/family-relationship-api-sensitive-read
          fetch-depth: 1
          persist-credentials: true

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply reviewed audit correction
        run: python tooling/temp-audit-fix-family-relationship-api.py

      - name: Normalize and generate
        run: |
          pnpm --filter @newax/api db:format
          pnpm --filter @newax/api db:generate
          pnpm format

      - name: Apply all migrations
        run: pnpm --filter @newax/api db:migrate:deploy

      - name: Verify correction
        run: |
          pnpm format:check
          pnpm lint
          pnpm --filter @newax/people typecheck
          pnpm --filter @newax/people test
          pnpm --filter @newax/api typecheck
          pnpm --filter @newax/api exec vitest run \
            src/database/person-relationship-operations-schema.spec.ts \
            src/database/person-relationship-operations-database.spec.ts \
            src/people/current-organization-family-relationships.input.spec.ts
          pnpm --filter @newax/api build

      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/api/prisma/schema.prisma \
            apps/api/prisma/migrations/20260717010000_govern_person_relationship_operations/migration.sql \
            apps/api/src/database/person-relationship-operations-schema.spec.ts \
            docs/decisions/0026-govern-family-relationship-operations-and-sensitive-reads.md
          git commit -m "Strengthen family relationship verification governance"
          git push origin HEAD:agent/family-relationship-api-sensitive-read
