name: Capture People Intake Build Diagnostics Temporary

on:
  pull_request:
    types:
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  build:
    if: github.head_ref == 'agent/family-intake-verification-dashboard'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v7
        with:
          ref: agent/family-intake-verification-dashboard
          fetch-depth: 1
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Capture production build output
        run: |
          set +e
          pnpm build > /tmp/people-intake-build.log 2>&1
          status=$?
          set -e
          cat /tmp/people-intake-build.log
          echo "exit_status=${status}" >> /tmp/people-intake-build.log

      - name: Upload build diagnostic
        uses: actions/upload-artifact@v7
        with:
          name: people-intake-build-${{ github.sha }}
          path: /tmp/people-intake-build.log
          if-no-files-found: error
          retention-days: 1
