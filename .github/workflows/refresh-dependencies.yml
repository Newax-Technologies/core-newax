name: Refresh Dependency Lockfile

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: refresh-dependencies-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh:
    if: github.actor != 'github-actions[bot]'
    name: Refresh and verify dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out main
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Refresh lockfile
        run: pnpm install --lockfile-only --ignore-scripts --no-frozen-lockfile

      - name: Validate frozen installation
        run: pnpm install --frozen-lockfile

      - name: Commit refreshed lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Refresh dependency lockfile"
          git push origin HEAD:main

      - name: Verify API build
        run: pnpm --filter @newax/api build

      - name: Verify API tests
        run: pnpm --filter @newax/api test

      - name: Verify web type-check
        run: pnpm --filter @newax/web typecheck

      - name: Verify linting
        run: pnpm lint
