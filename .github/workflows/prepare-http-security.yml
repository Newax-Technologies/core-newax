name: Prepare HTTP Security Boundary

on:
  pull_request:
    branches:
      - agent/trusted-request-context

permissions:
  contents: write

concurrency:
  group: prepare-http-security-boundary
  cancel-in-progress: false

jobs:
  prepare:
    if: ${{ github.head_ref == 'agent/http-security-boundary' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/http-security-boundary

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Prepare schema, migration, registry, and ADR index
        run: node tooling/prepare-http-security.mjs

      - name: Update workspace lockfile
        run: pnpm install --lockfile-only

      - name: Install prepared workspace
        run: pnpm install --frozen-lockfile

      - name: Apply lint fixes
        run: |
          pnpm exec eslint --fix \
            apps/api/src/config/environment.ts \
            apps/api/src/config/environment.spec.ts \
            apps/api/src/config/http-security-environment.ts \
            apps/api/src/config/http-security-environment.spec.ts \
            apps/api/src/health/health.controller.ts \
            apps/api/src/http-security \
            apps/api/src/main.ts \
            packages/http-security \
            tooling/prepare-http-security.mjs

      - name: Format the HTTP security slice
        run: |
          pnpm --filter @newax/api db:format
          pnpm exec prettier --write \
            apps/api/package.json \
            apps/api/src/config/environment.ts \
            apps/api/src/config/environment.spec.ts \
            apps/api/src/config/http-security-environment.ts \
            apps/api/src/config/http-security-environment.spec.ts \
            apps/api/src/health/health.controller.ts \
            apps/api/src/http-security \
            apps/api/src/main.ts \
            docs/decisions/README.md \
            docs/decisions/0019-build-http-security-boundary.md \
            packages/http-security \
            registry/module-registry.json \
            tooling/prepare-http-security.mjs

      - name: Capture lint diagnostics
        run: |
          pnpm exec eslint \
            apps/api/src/config/environment.ts \
            apps/api/src/config/environment.spec.ts \
            apps/api/src/config/http-security-environment.ts \
            apps/api/src/config/http-security-environment.spec.ts \
            apps/api/src/health/health.controller.ts \
            apps/api/src/http-security \
            apps/api/src/main.ts \
            packages/http-security \
            tooling/prepare-http-security.mjs \
            > http-security-lint-report.txt 2>&1 || true

      - name: Commit prepared files and diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            apps/api/package.json \
            apps/api/prisma \
            apps/api/src/config \
            apps/api/src/health/health.controller.ts \
            apps/api/src/http-security \
            apps/api/src/main.ts \
            docs/decisions \
            http-security-lint-report.txt \
            packages/http-security \
            pnpm-lock.yaml \
            registry/module-registry.json \
            tooling/prepare-http-security.mjs

          if git diff --cached --quiet; then
            echo "HTTP security files are already prepared."
            exit 0
          fi

          git commit -m "Prepare HTTP security boundary workspace [skip http prepare]"
          git push origin HEAD:agent/http-security-boundary
