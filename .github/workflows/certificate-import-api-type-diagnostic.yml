name: Capture Certificate Import API Type Temporary

on:
  pull_request:
    types:
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  typecheck:
    if: github.head_ref == 'agent/certificate-import-evidence-staging'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: agent/certificate-import-evidence-staging
          fetch-depth: 1
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Materialize reviewed implementation
        run: |
          python tooling/temp-build-certificate-import-evidence.py
          python tooling/temp-fix-certificate-import-lint.py
          pnpm --filter @newax/api db:format
          pnpm --filter @newax/api db:generate
          pnpm exec eslint apps/api/src/people-intake apps/web/src/app/internal/people-intake/certificate-imports packages/people-intake/src --fix
          pnpm format

      - name: Capture API type-check
        id: typecheck
        continue-on-error: true
        run: |
          set +e
          pnpm --filter @newax/api typecheck > /tmp/certificate-import-api-type.log 2>&1
          status=$?
          set -e
          cat /tmp/certificate-import-api-type.log
          exit "$status"

      - name: Upload type transcript
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: certificate-import-api-type-${{ github.sha }}
          path: /tmp/certificate-import-api-type.log
          if-no-files-found: error
          retention-days: 1

      - name: Enforce result
        if: steps.typecheck.outcome == 'failure'
        run: exit 1
