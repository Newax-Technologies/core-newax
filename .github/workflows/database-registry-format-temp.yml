name: Database Registry Format Temporary

on:
  pull_request:

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Format detailed registry sources
        run: >-
          npx --yes prettier@3.9.0 --write
          tooling/database-registry/explain.js
          tooling/database-registry/explain.css
          tooling/database-registry/render.mjs

      - name: Commit canonical formatting
        run: |
          if git diff --quiet; then
            echo "Formatting already canonical."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tooling/database-registry/explain.js tooling/database-registry/explain.css tooling/database-registry/render.mjs
          git commit -m "Format detailed database registry sources"
          git push
